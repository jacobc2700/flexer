<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
      integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN"
      crossorigin="anonymous"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css?family=Roboto"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.min.css" />
    <title>Flexer</title>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar bg-dark">
      <h1>
        <a href="dashboard.html">
          <i class="fa fa-code"></i> Flexer <i class="fa fa-code"></i>
        </a>
      </h1>
      <ul>
        <li><a href="profiles.html">Developers</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html">Login</a></li>
      </ul>
    </nav>

    <section class="container">
      <h1 class="large text-primary">Register</h1>
      <p class="lead">
        <i class="fa fa-user"></i> Create a new account on Flexer.
      </p>

      <!-- Form with HTML5 validation -->
      <form action="dashboard.html" class="form">
        <div class="form-group">
          <input type="text" placeholder="Full Name" required />
        </div>
        <div class="form-group">
          <input type="email" placeholder="Email Address" />
          <small class="form-text">Gravatar</small>
        </div>
        <div class="form-group">
          <input type="password" placeholder="Password" minlength="8" />
        </div>
        <div class="form-group">
          <input type="password" placeholder="Confirm Password" minlength="8" />
        </div>
      </form>
      <p class="my-1">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </section>
  </body>
</html>
